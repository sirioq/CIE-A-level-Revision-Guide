name: Build and Deploy PDF

on: [push]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_latex:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v4

      # ── AS Combined PDF ──────────────────────────────────────────────────────
      - name: Compile AS combined PDF (main_AS.tex)
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main_AS.tex

      # ── A2 Combined PDF ──────────────────────────────────────────────────────
      - name: Compile A2 combined PDF (main_A2.tex)
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main_A2.tex

      # ── Full Combined PDF (all topics) ───────────────────────────────────────
      - name: Compile full combined PDF (main.tex)
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex

      # ── Topic 1 — Physical Quantities and Units ──────────────────────────────
      - name: Compile Topic 01 standalone PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: topic_01_standalone.tex
          working_directory: topic_01

      # ── Topic 2 — Kinematics ─────────────────────────────────────────────────
      - name: Compile Topic 02 standalone PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: topic_02_standalone.tex
          working_directory: topic_02

      # ── Topic 3 — Dynamics ───────────────────────────────────────────────────
      - name: Compile Topic 03 standalone PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: topic_03_standalone.tex
          working_directory: topic_03

      # ── Topic 4 — Forces, Density and Pressure ───────────────────────────────
      - name: Compile Topic 04 standalone PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: topic_04_standalone.tex
          working_directory: topic_04

      # ── Topic 5 — Work, Energy and Power ────────────────────────────────────
      - name: Compile Topic 05 standalone PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: topic_05_standalone.tex
          working_directory: topic_05

      # ── Topic 6 — Deformation of Solids ─────────────────────────────────────
      - name: Compile Topic 06 standalone PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: topic_06_standalone.tex
          working_directory: topic_06

      # ── Topic 7 — Waves ──────────────────────────────────────────────────────
      - name: Compile Topic 07 standalone PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: topic_07_standalone.tex
          working_directory: topic_07

      # ── Topic 8 — Superposition ──────────────────────────────────────────────
      - name: Compile Topic 08 standalone PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: topic_08_standalone.tex
          working_directory: topic_08

      # ── Topic 9 — Electricity ────────────────────────────────────────────────
      - name: Compile Topic 09 standalone PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: topic_09_standalone.tex
          working_directory: topic_09

      # ── Topic 10 — D.C. Circuits ─────────────────────────────────────────────
      - name: Compile Topic 10 standalone PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: topic_10_standalone.tex
          working_directory: topic_10

      # ── Topic 11 — Particle Physics ──────────────────────────────────────────
      - name: Compile Topic 11 standalone PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: topic_11_standalone.tex
          working_directory: topic_11

      # ── Topic 12 — Motion in a Circle ────────────────────────────────────────
      - name: Compile Topic 12 standalone PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: topic_12_standalone.tex
          working_directory: topic_12

      # ── Topic 13 — Gravitational Fields ──────────────────────────────────────
      - name: Compile Topic 13 standalone PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: topic_13_standalone.tex
          working_directory: topic_13

      # ── Topics 14, 15 & 16 — Thermal Physics ─────────────────────────────────
      - name: Compile Topics 14-16 standalone PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: topics_14_15_16_standalone.tex
          working_directory: topics_14_15_16

      # ── Topic 17 — Oscillations ───────────────────────────────────────────────
      - name: Compile Topic 17 standalone PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: topic_17_standalone.tex
          working_directory: topic_17

      # ── Topic 18 — Electric Fields ───────────────────────────────────────────
      - name: Compile Topic 18 standalone PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: topic_18_standalone.tex
          working_directory: topic_18

      # ── Topic 19 — Capacitance ───────────────────────────────────────────────
      - name: Compile Topic 19 standalone PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: topic_19_standalone.tex
          working_directory: topic_19

      # ── Topic 20 — Magnetic Fields ───────────────────────────────────────────
      - name: Compile Topic 20 standalone PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: topic_20_standalone.tex
          working_directory: topic_20

      # ── Topic 21 — Alternating Currents ──────────────────────────────────────
      - name: Compile Topic 21 standalone PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: topic_21_standalone.tex
          working_directory: topic_21

      # ── Topic 22 — Quantum Physics ───────────────────────────────────────────
      - name: Compile Topic 22 standalone PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: topic_22_standalone.tex
          working_directory: topic_22

      # ── Topic 23 — Nuclear Physics ───────────────────────────────────────────
      - name: Compile Topic 23 standalone PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: topic_23_standalone.tex
          working_directory: topic_23

      # ── Topic 24 — Medical Physics ───────────────────────────────────────────
      - name: Compile Topic 24 standalone PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: topic_24_standalone.tex
          working_directory: topic_24

      # ── Topic 25 — Astronomy and Cosmology ───────────────────────────────────
      - name: Compile Topic 25 standalone PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: topic_25_standalone.tex
          working_directory: topic_25

      # ── Deploy ───────────────────────────────────────────────────────────────
      - name: Prepare files for deployment
        run: |
          mkdir -p public/topic_01
          mkdir -p public/topic_02
          mkdir -p public/topic_03
          mkdir -p public/topic_04
          mkdir -p public/topic_05
          mkdir -p public/topic_06
          mkdir -p public/topic_07
          mkdir -p public/topic_08
          mkdir -p public/topic_09
          mkdir -p public/topic_10
          mkdir -p public/topic_11
          mkdir -p public/topic_12
          mkdir -p public/topic_13
          mkdir -p public/topics_14_15_16
          mkdir -p public/topic_17
          mkdir -p public/topic_18
          mkdir -p public/topic_19
          mkdir -p public/topic_20
          mkdir -p public/topic_21
          mkdir -p public/topic_22
          mkdir -p public/topic_23
          mkdir -p public/topic_24
          mkdir -p public/topic_25
          cp main.pdf public/
          cp main_AS.pdf public/
          cp main_A2.pdf public/
          cp index.html public/
          cp topic_01/topic_01_standalone.pdf public/topic_01/topic_01.pdf
          cp topic_02/topic_02_standalone.pdf public/topic_02/topic_02.pdf
          cp topic_03/topic_03_standalone.pdf public/topic_03/topic_03.pdf
          cp topic_04/topic_04_standalone.pdf public/topic_04/topic_04.pdf
          cp topic_05/topic_05_standalone.pdf public/topic_05/topic_05.pdf
          cp topic_06/topic_06_standalone.pdf public/topic_06/topic_06.pdf
          cp topic_07/topic_07_standalone.pdf public/topic_07/topic_07.pdf
          cp topic_08/topic_08_standalone.pdf public/topic_08/topic_08.pdf
          cp topic_09/topic_09_standalone.pdf public/topic_09/topic_09.pdf
          cp topic_10/topic_10_standalone.pdf public/topic_10/topic_10.pdf
          cp topic_11/topic_11_standalone.pdf public/topic_11/topic_11.pdf
          cp topic_12/topic_12_standalone.pdf public/topic_12/topic_12.pdf
          cp topic_13/topic_13_standalone.pdf public/topic_13/topic_13.pdf
          cp topics_14_15_16/topics_14_15_16_standalone.pdf public/topics_14_15_16/topics_14_15_16.pdf
          cp topic_17/topic_17_standalone.pdf public/topic_17/topic_17.pdf
          cp topic_18/topic_18_standalone.pdf public/topic_18/topic_18.pdf
          cp topic_19/topic_19_standalone.pdf public/topic_19/topic_19.pdf
          cp topic_20/topic_20_standalone.pdf public/topic_20/topic_20.pdf
          cp topic_21/topic_21_standalone.pdf public/topic_21/topic_21.pdf
          cp topic_22/topic_22_standalone.pdf public/topic_22/topic_22.pdf
          cp topic_23/topic_23_standalone.pdf public/topic_23/topic_23.pdf
          cp topic_24/topic_24_standalone.pdf public/topic_24/topic_24.pdf
          cp topic_25/topic_25_standalone.pdf public/topic_25/topic_25.pdf

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
